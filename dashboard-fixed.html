
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم — وكالة ميديا</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Fonts: Tajawal -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --primary:   #6366f1;
      --primary-d: #4f46e5;
      --ok:        #10b981;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --info:      #3b82f6;
      --bg:        #f1f5f9;
      --card:      #ffffff;
      --text:      #0f172a;
      --muted:     #64748b;
      --border:    #e2e8f0;
      --shadow:    0 2px 12px rgba(0,0,0,.07);
      --shadow-h:  0 8px 32px rgba(99,102,241,.18);
      --radius:    14px;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem;
      min-height: 100vh;
    }

    /* ── KPI Cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem 1rem;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .25s ease, box-shadow .25s ease;
      cursor: default;
    }

    .kpi-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-h);
    }

    .kpi-card:hover .bg-icon-float {
      opacity: .12;
      transform: rotate(12deg) scale(1.18);
    }

    /* أيقونة كبيرة شفافة في الخلفية */
    .bg-icon-float {
      position: absolute;
      left: -10px;
      bottom: -10px;
      font-size: 5.5rem;
      opacity: .07;
      transition: opacity .3s, transform .3s;
      line-height: 1;
      pointer-events: none;
      color: inherit;
    }

    .kpi-card .kpi-label {
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    .kpi-card .kpi-val {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: .3rem;
      direction: ltr;
    }

    .kpi-card .kpi-sub {
      font-size: .78rem;
      color: var(--muted);
    }

    /* ألوان الكروت */
    .kpi-c1 { border-top: 4px solid var(--primary); color: var(--primary); }
    .kpi-c2 { border-top: 4px solid var(--ok);      color: var(--ok); }
    .kpi-c3 { border-top: 4px solid var(--warn);    color: var(--warn); }
    .kpi-c4 { border-top: 4px solid var(--info);    color: var(--info); }

    .kpi-card .kpi-val { color: var(--text); }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      display: inline-block;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skel-val  { width: 90px; height: 32px; }
    .skel-sub  { width: 120px; height: 14px; margin-top: 6px; }

    /* ── صندوق ── */
    .box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .box-head {
      padding: .9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
    }
    .box-title {
      font-size: .95rem;
      font-weight: 700;
      margin: 0;
      color: var(--text);
    }
    .box-body { padding: 1rem 1.2rem; }

    /* ── شريط التقدم ── */
    .progress { height: 8px; border-radius: 4px; background: var(--border); }
    .progress-bar { border-radius: 4px; transition: width .6s ease; }

    /* ── شرائح (chips) ── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .22rem .7rem;
      border-radius: 99px;
      font-size: .78rem;
      font-weight: 600;
    }
    .chip-primary { background: #ede9fe; color: var(--primary); }
    .chip-ok      { background: #d1fae5; color: var(--ok); }
    .chip-warn    { background: #fef3c7; color: #b45309; }
    .chip-danger  { background: #fee2e2; color: var(--danger); }
    .chip-blue    { background: #dbeafe; color: var(--info); }

    /* ── قائمة الحجوزات القريبة ── */
    .booking-item {
      padding: .75rem 0;
      border-bottom: 1px dashed var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: .5rem;
    }
    .booking-item:last-child { border-bottom: none; }
    .booking-name { font-weight: 700; font-size: .92rem; }
    .booking-meta { font-size: .78rem; color: var(--muted); margin-top: 2px; }
    .booking-badge {
      flex-shrink: 0;
      font-size: .75rem;
      font-weight: 700;
      padding: .25rem .65rem;
      border-radius: 99px;
    }
    .paid   { background: #d1fae5; color: var(--ok); }
    .unpaid { background: #fee2e2; color: var(--danger); }

    /* ── empty state ── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      padding: 2rem 1rem;
    }

    /* ── Grid مزدوج ── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 768px) {
      body { padding: .6rem; }
      .dash-grid { grid-template-columns: 1fr; }
      .kpi-grid  { grid-template-columns: repeat(2, 1fr); }
      .kpi-card .kpi-val { font-size: 1.5rem; }
    }

    @media (max-width: 400px) {
      .kpi-grid { grid-template-columns: 1fr; }
    }

    /* ── تحديث في الخلفية — شريط علوي صغير ── */
    #bgUpdateBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--ok));
      background-size: 200% 100%;
      animation: barSlide 1.5s linear infinite;
      z-index: 9998;
      display: none;
    }
    @keyframes barSlide {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
  </style>
</head>
<body>

<!-- شريط تحميل خلفي (يظهر فقط عند تحميل الحجوزات في الخلفية) -->
<div id="bgUpdateBar"></div>

<!-- ── KPI Cards ── -->
<div class="kpi-grid" id="kpiGrid">

  <div class="kpi-card kpi-c1">
    <div class="kpi-label"><i class="fas fa-calendar-check me-1"></i>إجمالي الحجوزات</div>
    <div class="kpi-val" id="k-bk"><span class="skeleton skel-val"></span></div>
    <div class="kpi-sub">جميع الحجوزات المسجّلة</div>
    <div class="bg-icon-float"><i class="fas fa-calendar-check"></i></div>
  </div>

  <div class="kpi-card kpi-c2">
    <div class="kpi-label"><i class="fas fa-coins me-1"></i>إجمالي الإيرادات</div>
    <div class="kpi-val" id="k-rv"><span class="skeleton skel-val"></span></div>
    <div class="kpi-sub" id="k-rv-sub"><span class="skeleton skel-sub"></span></div>
    <div class="bg-icon-float"><i class="fas fa-coins"></i></div>
  </div>

  <div class="kpi-card kpi-c3">
    <div class="kpi-label"><i class="fas fa-hourglass-half me-1"></i>المستحقات</div>
    <div class="kpi-val" id="k-rc"><span class="skeleton skel-val"></span></div>
    <div class="kpi-sub">المبالغ المتبقية غير المحصّلة</div>
    <div class="bg-icon-float"><i class="fas fa-hourglass-half"></i></div>
  </div>

  <div class="kpi-card kpi-c4">
    <div class="kpi-label"><i class="fas fa-chart-line me-1"></i>صافي الربح</div>
    <div class="kpi-val" id="k-nt"><span class="skeleton skel-val"></span></div>
    <div class="kpi-sub">بعد خصم جميع المصروفات</div>
    <div class="bg-icon-float"><i class="fas fa-chart-line"></i></div>
  </div>
</div>

<!-- ── Grid ── -->
<div class="dash-grid">

  <!-- المستهدف الشهري -->
  <div class="box">
    <div class="box-head">
      <h3 class="box-title"><i class="fas fa-bullseye me-2" style="color:var(--primary)"></i>المستهدف الشهري</h3>
      <span class="chip chip-primary" id="t-lbl"><span class="skeleton" style="width:80px;height:14px;display:block"></span></span>
    </div>
    <div class="box-body">
      <div class="row g-3 mb-3">
        <div class="col-4 text-center">
          <div style="font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:4px">المستهدف</div>
          <div style="font-size:1.25rem;font-weight:800;direction:ltr" id="t-tgt">--</div>
        </div>
        <div class="col-4 text-center">
          <div style="font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:4px">المحقق</div>
          <div style="font-size:1.25rem;font-weight:800;color:var(--ok);direction:ltr" id="t-ach">--</div>
        </div>
        <div class="col-4 text-center">
          <div style="font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:4px">المتبقي</div>
          <div style="font-size:1.25rem;font-weight:800;color:var(--warn);direction:ltr" id="t-rem">--</div>
        </div>
      </div>

      <div class="d-flex justify-content-between mb-2">
        <small class="text-muted">نسبة الإنجاز</small>
        <small style="font-weight:700;color:var(--primary)" id="t-pct">0%</small>
      </div>
      <div class="progress mb-3">
        <div id="t-bar" class="progress-bar bg-success" style="width:0%"></div>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <span class="chip chip-blue">
          <i class="fas fa-clock"></i>
          تبقّى <strong id="d-left">0</strong> يوم في الشهر
        </span>
      </div>
    </div>
  </div>

  <!-- أقرب الحجوزات -->
  <div class="box">
    <div class="box-head">
      <h3 class="box-title"><i class="fas fa-calendar-day me-2" style="color:var(--ok)"></i>أقرب الحجوزات</h3>
      <span class="chip chip-ok" id="td-lbl" style="font-size:.72rem">--</span>
    </div>
    <div class="box-body" id="td-list">
      <!-- Skeleton -->
      <div style="padding:.75rem 0;border-bottom:1px dashed var(--border)">
        <span class="skeleton" style="width:60%;height:16px;display:block;margin-bottom:6px"></span>
        <span class="skeleton" style="width:40%;height:13px;display:block"></span>
      </div>
      <div style="padding:.75rem 0">
        <span class="skeleton" style="width:50%;height:16px;display:block;margin-bottom:6px"></span>
        <span class="skeleton" style="width:35%;height:13px;display:block"></span>
      </div>
    </div>
  </div>

</div>

<!-- ── Scripts ── -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="config-fixed.js"></script>

<script>
/* ── أدوات عرض ── */
const n  = v => Utils.formatNum(v, 0) + " ريال";
const nb = v => Utils.formatNum(v, 0);
const esc= t => Utils.esc(t);

function setTxt(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

function daysLeft() {
  return Utils.daysLeftInMonth();
}

/* ── ملء KPI من بيانات dashStats ── */
function renderDashStats(s) {
  if (!s) return;

  setTxt("k-bk", nb(s.totalBookings));
  setTxt("k-rv", n(s.totalRevenue));
  setTxt("k-rv-sub", "واصل: " + n(s.totalReceivables));
  setTxt("k-rc", n(s.totalReceivables));
  setTxt("k-nt", n(s.netProfit));

  setTxt("t-lbl", s.monthLabel || "--");
  setTxt("t-tgt", n(s.monthTarget));
  setTxt("t-ach", n(s.monthAchieved));
  setTxt("t-rem", n(s.monthRemaining));
  setTxt("t-pct", (s.monthPercent || 0) + "%");
  setTxt("d-left", daysLeft());
  setTxt("td-lbl", s.todaysLabel || "--");

  const bar = document.getElementById("t-bar");
  if (bar) bar.style.width = Math.min(100, parseFloat(s.monthPercent) || 0) + "%";

  renderNearest(s.todaysBookings || []);
}

/* ── قائمة أقرب الحجوزات ── */
function renderNearest(list) {
  const el = document.getElementById("td-list");
  if (!list || !list.length) {
    el.innerHTML = '<div class="empty"><i class="fas fa-calendar-xmark fa-2x mb-2 d-block text-muted"></i>لا توجد حجوزات خلال 3 أيام</div>';
    return;
  }
  el.innerHTML = list.map(b => `
    <div class="booking-item">
      <div>
        <div class="booking-name">${esc(b.name)}</div>
        <div class="booking-meta">
          ${esc(b.type)}
          ${b.date ? " — " + esc(b.date) : ""}
          ${b.time ? " — " + esc(b.time) : ""}
          ${b.assignedTo ? " — " + esc(b.assignedTo) : ""}
        </div>
      </div>
      <div>
        <span class="booking-badge ${+b.remaining > 0 ? "unpaid" : "paid"}">
          ${+b.remaining > 0 ? nb(b.remaining) + " ريال" : "مسدد ✓"}
        </span>
      </div>
    </div>
  `).join("");
}

/* ── التحميل الرئيسي ── */
document.addEventListener("DOMContentLoaded", async () => {

  // مرحلة 1: التحقق من الجلسة
  if (!Utils.guardSession()) return;

  // مرحلة 2: استمع على getInitData — يُملأ بمجرد وصول البيانات الأساسية
  AppLoader.on("onInitReady", (ds) => {
    if (ds.dashStats) {
      renderDashStats(ds.dashStats);
    } else {
      // fallback: اطلب getDashboardStats مباشرة
      API.run("getDashboardStats")
        .then(renderDashStats)
        .catch(e => {
          console.error(e);
          document.getElementById("td-list").innerHTML =
            '<div class="empty text-danger"><i class="fas fa-triangle-exclamation me-1"></i>تعذر تحميل البيانات</div>';
        });
    }
  });

  // مرحلة 3: عند اكتمال تحميل الحجوزات في الخلفية — نحدّث الكروت بأرقام أدق
  AppLoader.on("onBookingsReady", (bookings) => {
    // الكروت قد تكون محدّثة بالفعل — يمكن عرض مؤشر "تم التحديث"
    hideBgBar();
  });

  // بدء AppLoader
  showBgBar();
  await AppLoader.start();
});

function showBgBar() {
  const bar = document.getElementById("bgUpdateBar");
  if (bar) bar.style.display = "block";
}
function hideBgBar() {
  const bar = document.getElementById("bgUpdateBar");
  if (bar) bar.style.display = "none";
}
</script>

</body>
</html>
