
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وكالة ميديا — تسجيل الدخول</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

  <style>
    /* ══════════════════════════════════════════
       متغيرات التصميم
    ══════════════════════════════════════════ */
    :root {
      --p:        #014979;
      --p-dk:     #012e50;
      --p-lt:     #e8f4fd;
      --gold:     #c6a43f;
      --gold-lt:  #fdf6e3;
      --gold-dk:  #a68a2e;
      --ok:       #059669;
      --err:      #dc2626;
      --warn:     #d97706;
      --bg:       #f0f4f8;
      --card:     #ffffff;
      --border:   rgba(15,23,42,.08);
      --txt:      #0f172a;
      --muted:    #64748b;
      --r-sm:     .65rem;
      --r-md:     1rem;
      --r-lg:     1.5rem;
      --sh-sm:    0 2px 8px rgba(15,23,42,.06);
      --sh-md:    0 8px 24px rgba(15,23,42,.10);
      --sh-lg:    0 20px 48px rgba(15,23,42,.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ══════════════════════════════════════════
       صفحة الدخول
    ══════════════════════════════════════════ */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(1,73,121,.22) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(198,164,63,.14) 0%, transparent 50%),
        linear-gradient(135deg, #00243f 0%, #014979 50%, #026aa7 100%);
    }

    /* جسيمات متحركة خلفية */
    #loginPage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 85%, rgba(198,164,63,.07) 0%, transparent 40%),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,.04) 0%, transparent 40%);
      pointer-events: none;
    }

    /* دوائر زخرفية */
    .login-orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .login-orb-1 {
      width: 300px; height: 300px;
      top: -80px; left: -80px;
      background: radial-gradient(circle, rgba(198,164,63,.12), transparent 70%);
      animation-delay: 0s;
    }
    .login-orb-2 {
      width: 200px; height: 200px;
      bottom: -60px; right: -60px;
      background: radial-gradient(circle, rgba(1,73,121,.3), transparent 70%);
      animation-delay: -3s;
    }
    .login-orb-3 {
      width: 150px; height: 150px;
      top: 30%; right: 5%;
      background: radial-gradient(circle, rgba(255,255,255,.06), transparent 70%);
      animation-delay: -5s;
    }
    @keyframes orbFloat {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-20px) scale(1.05); }
    }

    .login-card {
      background: rgba(255,255,255,.97);
      border-radius: var(--r-lg);
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 410px;
      box-shadow: var(--sh-lg), 0 0 0 1px rgba(255,255,255,.18);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      animation: cardIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* شريط ذهبي علوي */
    .login-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--gold-dk), var(--gold), var(--gold-dk));
      border-radius: var(--r-lg) var(--r-lg) 0 0;
    }

    /* شعار وعنوان */
    .login-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
      margin-bottom: 2rem;
    }

    .login-logo-wrap {
      position: relative;
    }

    .login-logo {
      width: 72px; height: 72px;
      border-radius: 1.2rem;
      object-fit: cover;
      border: 2px solid var(--gold-lt);
      box-shadow: 0 12px 28px rgba(1,73,121,.22);
      display: block;
    }

    .login-logo-badge {
      position: absolute;
      bottom: -5px; left: -5px;
      width: 22px; height: 22px;
      background: var(--ok);
      border-radius: 50%;
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; color: #fff;
    }

    .login-title {
      font-size: 1.55rem;
      font-weight: 900;
      color: var(--p);
      text-align: center;
      line-height: 1.2;
    }

    .login-subtitle {
      font-size: .82rem;
      color: var(--muted);
      text-align: center;
    }

    /* رسالة خطأ */
    .login-error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: var(--err);
      border-radius: var(--r-sm);
      padding: .65rem .9rem;
      font-size: .85rem;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1.1rem;
      animation: errShake .35s ease;
    }
    .login-error.show { display: flex; }
    @keyframes errShake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* حقل الإدخال */
    .login-field label {
      font-weight: 700;
      font-size: .85rem;
      color: var(--txt);
      margin-bottom: .45rem;
      display: flex;
      align-items: center;
      gap: .35rem;
    }

    .login-input-wrap {
      position: relative;
    }

    .login-input {
      width: 100%;
      padding: .85rem 1rem .85rem 2.8rem;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      background: #f8fafc;
      color: var(--txt);
      transition: all .2s;
      letter-spacing: .12em;
      direction: ltr;
      text-align: center;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--p);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(1,73,121,.1);
      letter-spacing: .18em;
    }

    .login-input::placeholder {
      letter-spacing: normal;
      color: #94a3b8;
      text-align: center;
    }

    .login-input-icon {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: .9rem;
      pointer-events: none;
    }

    .login-eye-btn {
      position: absolute;
      right: .75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: .85rem;
      padding: .2rem;
    }

    /* زر الدخول */
    .login-btn {
      width: 100%;
      padding: .9rem;
      background: linear-gradient(135deg, var(--p) 0%, var(--p-dk) 100%);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      margin-top: 1.1rem;
      box-shadow: 0 4px 16px rgba(1,73,121,.32);
      position: relative;
      overflow: hidden;
    }

    .login-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(1,73,121,.4);
    }
    .login-btn:active:not(:disabled) { transform: none; }
    .login-btn:disabled { opacity: .7; cursor: not-allowed; transform: none; }

    /* Footer بسيط */
    .login-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      padding-top: 1.1rem;
      border-top: 1px solid var(--border);
      font-size: .76rem;
      color: var(--muted);
    }

    .login-version {
      display: flex;
      align-items: center;
      gap: .3rem;
    }

    /* ══════════════════════════════════════════
       التطبيق الرئيسي
    ══════════════════════════════════════════ */
    #mainApp {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }
    #mainApp.visible { display: flex; }

    /* ─── Header ─── */
    .app-header {
      background: linear-gradient(135deg, #00243f 0%, #014979 60%, #026aa7 100%);
      padding: .8rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.22);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: .72rem;
    }

    .header-logo {
      width: 42px; height: 42px;
      border-radius: .85rem;
      object-fit: cover;
      border: 1.5px solid rgba(255,255,255,.22);
      box-shadow: 0 4px 12px rgba(0,0,0,.22);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }

    .header-sub {
      font-size: .68rem;
      color: rgba(255,255,255,.65);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .header-user-name {
      font-size: .8rem;
      color: rgba(255,255,255,.85);
      font-weight: 600;
      display: none;
    }
    @media (min-width: 576px) { .header-user-name { display: block; } }

    .logout-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      width: 36px; height: 36px;
      border-radius: .6rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .2s;
      font-size: .9rem;
    }
    .logout-btn:hover { background: rgba(220,38,38,.5); border-color: transparent; }

    /* ─── Layout ─── */
    .app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ─── Sidebar (desktop) ─── */
    .sidebar {
      width: 210px;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid var(--border);
      padding: 1rem .65rem;
      display: flex;
      flex-direction: column;
      gap: .2rem;
      overflow-y: auto;
    }

    .sidebar-label {
      font-size: .68rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .5rem .75rem .3rem;
      margin-top: .3rem;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .6rem .85rem;
      border-radius: var(--r-sm);
      color: var(--muted);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      border: none;
      background: none;
      font-family: 'Tajawal', sans-serif;
      width: 100%;
      text-align: right;
    }

    .sidebar-item i {
      width: 18px;
      text-align: center;
      font-size: .92rem;
      flex-shrink: 0;
    }

    .sidebar-item:hover {
      background: var(--p-lt);
      color: var(--p);
    }

    .sidebar-item.active {
      background: linear-gradient(135deg, var(--p) 0%, #026aa7 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(1,73,121,.28);
    }

    /* ─── Page Content ─── */
    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: var(--bg);
    }

    .page-frame {
      width: 100%;
      flex: 1;
      border: none;
      display: none;
      background: var(--bg);
    }
    .page-frame.active { display: block; }

    /* Loader */
    .page-loader {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 1rem;
      color: var(--muted);
    }
    .page-loader.visible { display: flex; }

    .page-loader .spin {
      width: 42px; height: 42px;
      border: 3px solid var(--p-lt);
      border-top-color: var(--p);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .page-loader span {
      font-size: .88rem;
      font-weight: 600;
    }

    /* ─── Bottom Nav (mobile) ─── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 99;
      box-shadow: 0 -4px 20px rgba(15,23,42,.08);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: .5rem .2rem;
      gap: .2rem;
      cursor: pointer;
      color: var(--muted);
      font-size: .62rem;
      font-weight: 600;
      transition: all .18s;
      border: none;
      background: none;
      font-family: 'Tajawal', sans-serif;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .bottom-nav-item i { font-size: 1.12rem; transition: transform .2s; }
    .bottom-nav-item.active { color: var(--p); }
    .bottom-nav-item.active i { transform: scale(1.12); }

    .bottom-nav-item.active::before {
      content: "";
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 2.5px;
      background: linear-gradient(90deg, var(--p), var(--gold));
      border-radius: 0 0 4px 4px;
    }

    /* ─── Responsive ─── */
    @media (min-width: 992px) {
      .sidebar { display: flex; }
      .bottom-nav { display: none; }
      .page-content { padding-bottom: 0; }
    }
    @media (max-width: 991px) {
      .sidebar { display: none; }
      .page-content { padding-bottom: calc(62px + env(safe-area-inset-bottom, 0)); }
    }

    /* ─── Utilities ─── */
    .btn { font-family: 'Tajawal', sans-serif; font-weight: 600; }
    .form-control, .form-select { font-family: 'Tajawal', sans-serif; }
    .form-control:focus, .form-select:focus {
      border-color: var(--p);
      box-shadow: 0 0 0 .2rem rgba(1,73,121,.14);
    }

    /* شريط التحميل العلوي الخلفي */
    #topLoadBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--p), var(--gold), var(--ok));
      background-size: 300% 100%;
      animation: barMove 2s linear infinite;
      z-index: 9999;
      display: none;
      opacity: .9;
    }
    @keyframes barMove {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
  </style>
</head>
<body>

<!-- شريط تحميل علوي -->
<div id="topLoadBar"></div>

<!-- ══════════════════════════════════════════
     صفحة الدخول
══════════════════════════════════════════ -->
<div id="loginPage">
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-orb login-orb-3"></div>

  <div class="login-card">

    <div class="login-hero">
      <div class="login-logo-wrap">
        <img id="loginLogo" src="https://i.ibb.co/N6TXzy3q/image.png" alt="شعار الوكالة" class="login-logo">
        <div class="login-logo-badge"><i class="fas fa-check"></i></div>
      </div>
      <div>
        <div class="login-title" id="loginAppName">وكالة ميديا</div>
        <div class="login-subtitle">نظام الإدارة المتكامل</div>
      </div>
    </div>

    <div class="login-error" id="loginError">
      <i class="fas fa-triangle-exclamation"></i>
      <span id="loginErrorText"></span>
    </div>

    <div class="login-field mb-3">
      <label for="loginCode">
        <i class="fas fa-lock" style="color:var(--p)"></i>
        رمز الدخول
      </label>
      <div class="login-input-wrap">
        <i class="fas fa-key login-input-icon"></i>
        <input
          type="password"
          id="loginCode"
          class="login-input"
          placeholder="• • • • • • • •"
          autocomplete="current-password"
          maxlength="30"
        >
        <button class="login-eye-btn" type="button" id="eyeBtn" onclick="toggleEye()" tabindex="-1">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt" id="loginBtnIcon"></i>
      <span id="loginBtnText">دخول</span>
    </button>

    <div class="login-footer">
      <div class="login-version">
        <i class="fas fa-code-branch" style="font-size:.7rem"></i>
        <span>النسخة 5.0</span>
      </div>
      <span id="loginStatus" style="color:var(--ok)">
        <i class="fas fa-circle" style="font-size:.5rem"></i> جاهز
      </span>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════
     التطبيق الرئيسي
══════════════════════════════════════════ -->
<div id="mainApp">

  <!-- Header -->
  <header class="app-header">
    <div class="header-brand">
      <img id="headerLogo" src="https://i.ibb.co/N6TXzy3q/image.png" alt="" class="header-logo">
      <div>
        <div class="header-title" id="headerTitle">وكالة ميديا</div>
        <div class="header-sub">لوحة الإدارة</div>
      </div>
    </div>
    <div class="header-actions">
      <span class="header-user-name">
        مرحباً، <strong id="headerUserName">—</strong>
      </span>
      <button class="logout-btn" onclick="doLogout()" title="تسجيل الخروج">
        <i class="fas fa-right-from-bracket"></i>
      </button>
    </div>
  </header>

  <!-- Layout -->
  <div class="app-layout">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-label">القوائم</div>
    </nav>

    <!-- Content -->
    <main class="page-content" id="pageContent">
      <div class="page-loader visible" id="pageLoader">
        <div class="spin"></div>
        <span>جاري التحميل...</span>
      </div>

      <!-- الإطارات — تُحمَّل عند الحاجة -->
      <iframe id="frame-dashboard" class="page-frame" src="" title="لوحة التحكم" loading="lazy"></iframe>
      <iframe id="frame-bookings"  class="page-frame" src="" title="الحجوزات"    loading="lazy"></iframe>
      <iframe id="frame-finance"   class="page-frame" src="" title="المالية"      loading="lazy"></iframe>
      <iframe id="frame-projects"  class="page-frame" src="" title="المشاريع"     loading="lazy"></iframe>
      <iframe id="frame-settings"  class="page-frame" src="" title="الإعدادات"   loading="lazy"></iframe>
    </main>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" id="bottomNav"></nav>

</div>


<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="config-fixed.js"></script>

<script>
/* ══════════════════════════════════════════
   إعدادات الصفحات
══════════════════════════════════════════ */
const NAV_PAGES = [
  { id: "dashboard", label: "لوحة التحكم",       icon: "fas fa-gauge",           frame: "dashboard-fixed.html" },
  { id: "bookings",  label: "الحجوزات",           icon: "fas fa-calendar-check",  frame: "bookings-fixed2.html" },
  { id: "finance",   label: "المالية والمصروفات", icon: "fas fa-chart-line",       frame: "finance-fixed.html" },
  { id: "projects",  label: "المشاريع",           icon: "fas fa-diagram-project", frame: "projects-fixed.html" },
  { id: "settings",  label: "الإعدادات",          icon: "fas fa-gear",            frame: "settings-fixed.html" }
];

let _currentPage = "";
let _frameLoaded = {};  // تتبع الإطارات المحمّلة

/* ══════════════════════════════════════════
   الدخول / الخروج
══════════════════════════════════════════ */
document.getElementById("loginCode").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

function toggleEye() {
  const inp = document.getElementById("loginCode");
  const ico = document.getElementById("eyeIcon");
  const isPass = inp.type === "password";
  inp.type = isPass ? "text" : "password";
  ico.className = isPass ? "fas fa-eye-slash" : "fas fa-eye";
}

async function doLogin() {
  const code = document.getElementById("loginCode").value.trim();
  const btn  = document.getElementById("loginBtn");

  if (!code) { showLoginError("الرجاء إدخال رمز الدخول"); return; }

  document.getElementById("loginError").classList.remove("show");
  btn.disabled = true;
  document.getElementById("loginBtnIcon").className = "fas fa-spinner fa-spin";
  document.getElementById("loginBtnText").textContent = "جاري التحقق...";
  document.getElementById("loginStatus").innerHTML = `<i class="fas fa-circle-notch fa-spin" style="font-size:.7rem"></i> جاري الاتصال`;

  try {
    const result = await API.run("verifyLoginCodeV2", code);
    if (result && result.success) {
      Session.save(result);
      await showMainApp();
    } else {
      showLoginError(result?.message || "رمز الدخول غير صحيح");
    }
  } catch(e) {
    showLoginError("تعذر الاتصال بالخادم — تحقق من الإنترنت");
    console.error(e);
  } finally {
    btn.disabled = false;
    document.getElementById("loginBtnIcon").className = "fas fa-sign-in-alt";
    document.getElementById("loginBtnText").textContent = "دخول";
    document.getElementById("loginStatus").innerHTML = `<i class="fas fa-circle" style="font-size:.5rem"></i> جاهز`;
  }
}

function showLoginError(msg) {
  document.getElementById("loginErrorText").textContent = msg;
  const err = document.getElementById("loginError");
  err.classList.add("show");
  setTimeout(() => err.classList.remove("show"), 5000);
}

function doLogout() {
  Session.clear();
  window.location.href = APP_CONFIG.PAGES.index || "index.html";
}

/* ══════════════════════════════════════════
   عرض التطبيق بعد الدخول
══════════════════════════════════════════ */
async function showMainApp() {
  // إخفاء صفحة الدخول وإظهار التطبيق
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mainApp").classList.add("visible");

  // بيانات الجلسة
  const session = Session.get();
  document.getElementById("headerUserName").textContent = session.userName || "—";

  // بناء القوائم
  buildNav();

  // تشغيل AppLoader في الخلفية (getInitData)
  showTopBar();
  AppLoader.on("onInitReady", () => hideTopBar());
  AppLoader.start().catch(console.warn);

  // تحميل الصفحة الأولى المسموحة
  const allowed = getAllowedPages();
  if (!allowed.length) {
    document.getElementById("pageLoader").innerHTML =
      `<div style="text-align:center;color:var(--err);font-weight:700;padding:2rem">
        <i class="fas fa-ban fa-2x mb-2 d-block"></i>لا توجد صفحات متاحة لهذا المستخدم
      </div>`;
    document.getElementById("pageLoader").classList.add("visible");
    return;
  }
  openPage(allowed[0].id);
}

/* ══════════════════════════════════════════
   القوائم
══════════════════════════════════════════ */
function getAllowedPages() {
  return NAV_PAGES.filter(p => !Session.canAccess || Session.canAccess(p.id));
}

function buildNav() {
  const sidebar   = document.getElementById("sidebar");
  const bottomNav = document.getElementById("bottomNav");
  const allowed   = getAllowedPages();

  // Sidebar
  sidebar.innerHTML = `<div class="sidebar-label">القوائم</div>`;
  allowed.forEach(p => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "sidebar-item";
    btn.dataset.pageId = p.id;
    btn.innerHTML = `<i class="${p.icon}"></i><span>${p.label}</span>`;
    btn.addEventListener("click", () => openPage(p.id));
    sidebar.appendChild(btn);
  });

  // Bottom Nav
  bottomNav.innerHTML = "";
  allowed.forEach(p => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "bottom-nav-item";
    btn.dataset.pageId = p.id;
    btn.innerHTML = `<i class="${p.icon}"></i><span>${p.label}</span>`;
    btn.addEventListener("click", () => openPage(p.id));
    bottomNav.appendChild(btn);
  });
}

function updateNavActive() {
  document.querySelectorAll("[data-page-id]").forEach(el => {
    el.classList.toggle("active", el.dataset.pageId === _currentPage);
  });
}

/* ══════════════════════════════════════════
   التنقل بين الصفحات
══════════════════════════════════════════ */
function openPage(pageId) {
  const page = NAV_PAGES.find(p => p.id === pageId);
  if (!page) return;

  _currentPage = pageId;
  updateNavActive();

  const loader      = document.getElementById("pageLoader");
  const targetFrame = document.getElementById("frame-" + pageId);

  if (!targetFrame) return;

  // إخفاء كل الإطارات
  document.querySelectorAll(".page-frame").forEach(f => f.classList.remove("active"));

  // إذا الإطار محمّل مسبقاً — أظهره مباشرة
  if (_frameLoaded[pageId]) {
    loader.classList.remove("visible");
    targetFrame.classList.add("active");
    // أبلغ الإطار بأنه ظهر (مثلاً لتحديث التقويم)
    try { targetFrame.contentWindow.postMessage({ type: "page:shown", payload: { pageId } }, "*"); } catch(e) {}
    return;
  }

  // الإطار لم يُحمَّل — أظهر الـ loader واحمله
  loader.classList.add("visible");

  targetFrame.onload = () => {
    _frameLoaded[pageId] = true;
    loader.classList.remove("visible");
    targetFrame.classList.add("active");
    try { targetFrame.contentWindow.postMessage({ type: "page:shown", payload: { pageId } }, "*"); } catch(e) {}
  };

  targetFrame.onerror = () => {
    loader.innerHTML = `
      <div style="text-align:center;color:var(--err);font-weight:700;padding:2rem">
        <i class="fas fa-triangle-exclamation fa-2x mb-2 d-block"></i>
        تعذر تحميل الصفحة
      </div>`;
  };

  // ضع الـ src فقط عند الحاجة (lazy load)
  if (!targetFrame.getAttribute("src")) {
    targetFrame.src = page.frame;
  }
}

function navigateTo(pageId) { openPage(pageId); }

/* ══════════════════════════════════════════
   شريط التحميل العلوي
══════════════════════════════════════════ */
function showTopBar() {
  document.getElementById("topLoadBar").style.display = "block";
}
function hideTopBar() {
  const bar = document.getElementById("topLoadBar");
  bar.style.opacity = "0";
  bar.style.transition = "opacity .4s";
  setTimeout(() => {
    bar.style.display = "none";
    bar.style.opacity = "";
    bar.style.transition = "";
  }, 450);
}

/* ══════════════════════════════════════════
   رسائل من الإطارات الداخلية
══════════════════════════════════════════ */
window.addEventListener("message", e => {
  const { type, payload } = e.data || {};
  if (type === "navigate") navigateTo(payload);
  if (type === "logout")   doLogout();
  if (type === "toast" && typeof Toast !== "undefined") {
    Toast[payload?.level || "info"](payload?.message || "");
  }
});

/* ══════════════════════════════════════════
   عند تحميل الصفحة
══════════════════════════════════════════ */
window.addEventListener("load", () => {
  if (Session.isLoggedIn()) {
    showMainApp();
  } else {
    document.getElementById("loginCode").focus();
    document.getElementById("pageLoader").classList.remove("visible");
  }
});
</script>
</body>
</html>
