
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>الحجوزات — وكالة ميديا</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

  <style>
    :root {
      --p:       #014979;
      --p-dk:    #013560;
      --p-lt:    #e8f4fd;
      --gold:    #c6a43f;
      --gold-lt: #fdf6e3;
      --gold-dk: #a68a2e;
      --ok:      #059669;
      --ok-lt:   #d1fae5;
      --err:     #dc2626;
      --err-lt:  #fee2e2;
      --warn:    #d97706;
      --pur:     #6d28d9;
      --pur-lt:  #ede9fe;
      --bg:      #f1f5f9;
      --card:    #ffffff;
      --border:  rgba(15,23,42,.07);
      --txt:     #0f172a;
      --muted:   #64748b;
      --r:       .85rem;
      --r-lg:    1.2rem;
      --sh:      0 2px 12px rgba(15,23,42,.07);
      --sh-lg:   0 8px 28px rgba(15,23,42,.11);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--txt);
      font-size: 14px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      gap: .35rem;
      padding: .55rem .7rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: sticky;
      top: 0;
      z-index: 80;
      box-shadow: 0 2px 8px rgba(15,23,42,.06);
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tb {
      flex-shrink: 0;
      scroll-snap-align: start;
      display: inline-flex;
      align-items: center;
      gap: .32rem;
      padding: .42rem .82rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-family: 'Tajawal', sans-serif;
      font-size: .77rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      user-select: none;
    }
    .tb i { font-size: .72rem; }
    .tb:active { transform: scale(.95); }
    .tb.on { background: var(--p); color: #fff; border-color: var(--p); box-shadow: 0 3px 10px rgba(1,73,121,.3); }
    .tb[data-tab="tasks"].on { background: var(--ok); border-color: var(--ok); box-shadow: 0 3px 10px rgba(5,150,105,.3); }

    /* ── Panes ── */
    .pane { display: none; padding: .7rem; padding-bottom: max(.7rem, env(safe-area-inset-bottom)); }
    .pane.on { display: block; }

    .top-tools{
      display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;flex:1;justify-content:flex-end;
      min-width:260px;
    }
    .top-search{display:flex;align-items:center;gap:.35rem;flex-wrap:nowrap;min-width:min(100%,360px);flex:1}
    .top-search .form-control,.top-search .form-select{background:#fff;min-height:38px}
    .top-search .form-control{min-width:150px;flex:1}
    .top-search .form-select{width:auto;min-width:120px;flex:0 0 auto}
    .top-search .btn{min-height:38px;padding:.42rem .8rem;border-radius:999px}
    @media (max-width: 768px){
      .tab-bar{align-items:flex-start;flex-wrap:wrap}
      .top-tools{width:100%;justify-content:stretch}
      .top-search{min-width:100%;display:grid;grid-template-columns:1fr 120px 44px 44px}
      .top-search .form-control,.top-search .form-select,.top-search .btn{min-width:0;width:100%}
    }

    .kpi {
      background: var(--card);
      border-radius: var(--r-lg);
      padding: .8rem .88rem;
      border: 1px solid var(--border);
      box-shadow: var(--sh);
      position: relative;
      overflow: hidden;
      transition: transform .18s, box-shadow .18s;
      cursor: default;
    }
    .kpi:active { transform: scale(.97); }
    @media (hover: hover) { .kpi:hover { transform: translateY(-3px); box-shadow: var(--sh-lg); } }

    .kpi::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--r-lg) var(--r-lg) 0 0;
    }
    .kpi.kb::before { background: linear-gradient(90deg, var(--p), #38bdf8); }
    .kpi.kg::before { background: linear-gradient(90deg, var(--gold-dk), var(--gold)); }
    .kpi.kk::before { background: linear-gradient(90deg, var(--ok), #34d399); }
    .kpi.kp::before { background: linear-gradient(90deg, var(--pur), #a78bfa); }

    /* أيقونة خلفية شفافة */
    .kico {
      position: absolute;
      left: -.3rem; bottom: -.4rem;
      font-size: 3rem;
      opacity: .06;
      pointer-events: none;
      transition: transform .28s, opacity .28s;
    }
    @media (hover: hover) { .kpi:hover .kico { transform: scale(1.12) rotate(-8deg); opacity: .11; } }

    .kl { font-size: .68rem; font-weight: 700; color: var(--muted); margin-bottom: .22rem; }
    .kv { font-size: 1.4rem; font-weight: 900; line-height: 1; direction: ltr; }
    .kpi.kb .kv { color: var(--p); }
    .kpi.kg .kv { color: var(--gold-dk); }
    .kpi.kk .kv { color: var(--ok); }
    .kpi.kp .kv { color: var(--pur); }
    .ks { font-size: .66rem; color: var(--muted); margin-top: .2rem; }


    .toolbar-strip {
      margin-bottom: .7rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--sh);
      padding: .6rem;
    }
    .toolbar-inline {
      display:flex; align-items:center; gap:.45rem; flex-wrap:wrap;
    }
    .toolbar-field { position:relative; }
    .toolbar-search { flex: 1 1 340px; display:flex; align-items:center; gap:.35rem; }
    .toolbar-search .form-control { padding-inline-start: 2rem; min-width: 220px; }
    .toolbar-icon { position:absolute; right:.7rem; color:var(--muted); z-index:2; pointer-events:none; top:50%; transform:translateY(-50%); }
    .toolbar-type { flex: 0 1 180px; }
    .toolbar-actions { display:flex; align-items:center; gap:.35rem; flex-wrap:wrap; }
    .mini-btn { padding:.45rem .75rem; }
    @media (max-width: 768px) {
      .toolbar-inline { align-items:stretch; }
      .toolbar-search, .toolbar-type, .toolbar-actions { flex: 1 1 100%; }
      .toolbar-actions .tb { flex:1; justify-content:center; }
    }

    /* ── Box ── */
    .box {
      background: var(--card);
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      box-shadow: var(--sh);
      overflow: hidden;
      margin-bottom: .7rem;
    }
    .bh {
      padding: .6rem .85rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
    }
    .bt { font-weight: 800; font-size: .83rem; color: var(--p); display: flex; align-items: center; gap: .38rem; }
    .bb { padding: .7rem .85rem; }

    /* ── Chips ── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: .22rem;
      padding: .18rem .52rem;
      border-radius: 999px;
      font-size: .68rem;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .cb { background: var(--p-lt);   color: var(--p);      border-color: rgba(1,73,121,.15); }
    .cg { background: var(--ok-lt);  color: var(--ok);     border-color: rgba(5,150,105,.15); }
    .co { background: var(--gold-lt); color: var(--gold-dk); border-color: rgba(198,164,63,.2); }
    .cr { background: var(--err-lt); color: var(--err);    border-color: rgba(220,38,38,.15); }
    .cm { background: #f1f5f9;       color: var(--muted);  border-color: var(--border); }
    .cp { background: var(--pur-lt); color: var(--pur);    border-color: rgba(109,40,217,.15); }

    /* ── Progress ── */
    .prog { background: #e2e8f0; border-radius: 999px; height: 8px; overflow: hidden; margin: .38rem 0; }
    .pf { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--ok), #34d399); transition: width .7s ease; }

    /* ── Booking Mini Cards ── */
    .bm {
      padding: .58rem .72rem;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: #f8fafc;
      margin-bottom: .42rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
    }
    .bm-n { font-weight: 800; font-size: .82rem; color: var(--p); }
    .bm-m { font-size: .68rem; color: var(--muted); margin-top: .1rem; }
    .bm-r { font-size: .76rem; font-weight: 800; white-space: nowrap; padding: .14rem .42rem; border-radius: 999px; }

    /* ── Calendar ── */
    .fc {
      --fc-border-color: rgba(148,163,184,.18);
      --fc-today-bg-color: rgba(1,73,121,.06);
      font-family: 'Tajawal', sans-serif;
      font-size: .8rem;
    }
    .fc .fc-toolbar-title { font-size: .92rem; font-weight: 800; color: var(--p); }
    .fc .fc-button-primary { background: var(--p) !important; border-color: var(--p) !important; border-radius: .5rem !important; font-weight: 700; font-size: .73rem; padding: .28rem .6rem; }
    .fc .fc-button-primary.fc-button-active { background: var(--gold-dk) !important; border-color: var(--gold-dk) !important; }
    .fc .fc-col-header-cell-cushion { font-weight: 800; color: var(--p); font-size: .7rem; text-decoration: none; padding: .42rem 0; }
    .fc .fc-daygrid-day-number { text-decoration: none; color: var(--txt); font-weight: 600; font-size: .72rem; }
    .fc .fc-daygrid-event { border-radius: .35rem; border: none; padding: 1px 4px; font-size: .68rem; font-weight: 700; }
    .fc .fc-toolbar.fc-header-toolbar { margin-bottom: .55rem; gap: .38rem; flex-wrap: wrap; padding: .45rem; background: #f8fafc; border-radius: var(--r-lg) var(--r-lg) 0 0; }
    .fc .fc-scrollgrid { border-radius: 0 0 var(--r-lg) var(--r-lg); overflow: hidden; }

    /* ── Modal ── */
    .modal-dialog { max-width: 1180px; }
    .modal-content { border-radius: 1.25rem; border: none; box-shadow: 0 24px 64px rgba(0,0,0,.18); }
    .modal-footer-sticky { position: sticky; bottom: 0; background: #fff; border-top: 1px solid var(--border); z-index: 5; }
    @media (max-width: 768px) {
      .modal{padding:0 !important}
      .modal-dialog { margin: 0; max-width:100vw; width:100vw; min-height:100dvh; }
      .modal-content { min-height:100dvh; height:100dvh; border-radius:0; }
      .modal-body, .mb { max-height:none !important; overflow:auto !important; flex:1 1 auto; }
      .modal-footer-sticky { padding-bottom: max(.75rem, env(safe-area-inset-bottom)); }
      .mh { border-radius:0; padding:1rem 1rem .9rem; }
    }
    .mh {
      background: linear-gradient(135deg, var(--p) 0%, #026aa7 100%);
      color: #fff;
      padding: .8rem .95rem;
      border-radius: 1.25rem 1.25rem 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 800;
      font-size: .92rem;
    }
    .mh .btn-close { filter: brightness(0) invert(1); opacity: .9; }
    .mb { padding: .8rem; background: #f8fafc; }

    /* ── Form Sections ── */
    .fs {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: .7rem;
      margin-bottom: .55rem;
    }
    .fl { font-size: .72rem; font-weight: 700; color: var(--txt); margin-bottom: .28rem; display: block; }
    .form-control, .form-select {
      font-family: 'Tajawal', sans-serif;
      font-size: .82rem;
      border-color: var(--border);
      border-radius: var(--r);
      padding: .46rem .7rem;
    }
    .form-control:focus, .form-select:focus { border-color: var(--p); box-shadow: 0 0 0 .18rem rgba(1,73,121,.12); }

    /* ── Toggle Buttons ── */
    .tg-grp { display: flex; flex-wrap: wrap; gap: .32rem; }
    .tg {
      padding: .32rem .72rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-family: 'Tajawal', sans-serif;
      font-size: .73rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .13s;
      user-select: none;
    }
    .tg:active { transform: scale(.94); }
    .tg.st { background: var(--p); color: #fff; border-color: var(--p); box-shadow: 0 2px 8px rgba(1,73,121,.25); }
    .tg.ss { background: var(--gold-lt); color: var(--gold-dk); border-color: var(--gold); }

    /* ── Expense Row ── */
    .er { display: grid; grid-template-columns: 1fr .9fr .7fr auto; gap: .32rem; align-items: center; margin-bottom: .32rem; }
    @media (max-width: 400px) { .er { grid-template-columns: 1fr 1fr; } .er .ed { grid-column: span 2; justify-self: end; } }
    .er .form-control, .er .form-select { font-size: .75rem; padding: .35rem .5rem; }
    .ed {
      width: 28px; height: 28px;
      border-radius: .42rem;
      border: 1px solid var(--border);
      background: var(--err-lt);
      color: var(--err);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .72rem; flex-shrink: 0;
    }

    /* ── Finance Grid ── */
    .fin-g { display: grid; grid-template-columns: repeat(3, 1fr); gap: .38rem; }
    @media (max-width: 340px) { .fin-g { grid-template-columns: 1fr 1fr; } }

    /* ── Booking Day Card ── */
    .dc {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: .7rem;
      margin-bottom: .48rem;
      transition: box-shadow .18s;
    }
    .dc:hover { box-shadow: var(--sh); }
    .dc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .45rem; margin-bottom: .4rem; }
    .dc-name { font-weight: 800; font-size: .88rem; color: var(--p); }
    .dc-chips { display: flex; flex-wrap: wrap; gap: .22rem; margin-bottom: .4rem; }
    .dc-fin {
      background: #fff;
      border: 1px dashed rgba(148,163,184,.28);
      border-radius: .52rem;
      padding: .42rem .58rem;
      font-size: .73rem;
      margin-bottom: .4rem;
      display: flex; flex-wrap: wrap; gap: .25rem .8rem;
    }
    .dc-fin span { display: flex; align-items: center; gap: .22rem; }
    .dc-acts { display: flex; flex-wrap: wrap; gap: .28rem; }
    .dc-acts .btn { font-size: .7rem; padding: .26rem .58rem; border-radius: .48rem; font-weight: 700; font-family: 'Tajawal', sans-serif; }

    /* ── Tasks Cards ── */
    .tc {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: .72rem;
      margin-bottom: .48rem;
      border-right: 3px solid var(--p);
      transition: box-shadow .18s;
    }
    .tc:hover { box-shadow: var(--sh); }
    .tc.past { border-right-color: #cbd5e1; }
    .td { display: inline-flex; align-items: center; gap: .22rem; background: var(--p-lt); color: var(--p); border-radius: 999px; padding: .16rem .52rem; font-size: .67rem; font-weight: 700; margin-bottom: .35rem; }
    .tt { font-weight: 800; font-size: .86rem; margin-bottom: .22rem; }
    .tm { font-size: .72rem; color: var(--muted); }
    .ts { display: flex; flex-wrap: wrap; gap: .22rem; margin-top: .32rem; }
    .twa {
      display: inline-flex; align-items: center; gap: .28rem;
      margin-top: .42rem; padding: .28rem .7rem;
      border-radius: 999px; background: #dcfce7; color: #15803d;
      font-size: .7rem; font-weight: 700; text-decoration: none;
      border: 1px solid rgba(21,128,61,.15);
    }

    /* ── Empty / Loading ── */
    .empty { text-align: center; padding: 1.8rem 1rem; color: var(--muted); }
    .empty i { font-size: 2rem; opacity: .22; display: block; margin-bottom: .55rem; }
    .empty p { font-size: .8rem; }
    .ld { display: flex; align-items: center; justify-content: center; padding: 1.4rem; }
    .sp { width: 26px; height: 26px; border: 3px solid var(--p-lt); border-top-color: var(--p); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Grids ── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: .45rem; }
    .g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: .38rem; }
    @media (min-width: 768px) { .md2 { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; } }

    .sep {
      display: flex; align-items: center; gap: .45rem;
      margin: .7rem 0; font-size: .7rem; color: var(--muted); font-weight: 700;
    }
    .sep::before, .sep::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    /* ── شريط تحميل الخلفية ── */
    #bgBar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--p), var(--gold));
      background-size: 200% 100%;
      animation: bgBarAnim 1.5s linear infinite;
      z-index: 9000;
      display: none;
    }
    @keyframes bgBarAnim {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* ── Skeleton ── */
    .sk {
      background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: skAnim 1.4s infinite;
      border-radius: 6px;
      display: inline-block;
    }
    @keyframes skAnim {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .tab-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:.5rem;
      flex-wrap:wrap;
    }
    .tab-tabs{display:flex;gap:.35rem;flex-wrap:wrap}
    .tab-tools{
      display:flex;
      align-items:center;
      gap:.45rem;
      flex-wrap:wrap;
      margin-inline-start:auto;
    }
    .mini-search-wrap{
      display:flex;align-items:center;gap:.35rem;
      background:#f8fafc;border:1px solid var(--border);
      border-radius:999px;padding:.2rem .25rem .2rem .55rem;
      min-width:min(100%, 340px);
    }
    .mini-search{
      border:none;background:transparent;outline:none;
      font-family:'Tajawal', sans-serif;font-size:.78rem;
      color:var(--txt);width:210px;max-width:42vw;
    }
    .mini-search::placeholder{color:var(--muted)}
    .mini-filter-wrap{
      display:flex;align-items:center;gap:.35rem;
      background:#f8fafc;border:1px solid var(--border);
      border-radius:999px;padding:.2rem .35rem .2rem .55rem;
    }
    .mini-label{font-size:.74rem;font-weight:800;color:var(--muted);margin:0}
    .mini-select{
      border:none;background:transparent;outline:none;
      font-family:'Tajawal', sans-serif;font-size:.78rem;font-weight:800;
      color:var(--txt);padding:0 .15rem;min-width:72px;
    }
    .icon-circle{
      width:32px;height:32px;border-radius:999px;border:1px solid var(--border);
      background:#fff;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;padding:0;
    }
    .icon-circle i{font-size:.85rem;line-height:1;display:flex;align-items:center;justify-content:center}
    .icon-circle.primary{background:var(--p);border-color:var(--p);color:#fff}
    #pane-calendar{padding-top:.45rem}
    #bModal .modal-dialog{
      margin:0 !important;max-width:none !important;width:100vw;height:100dvh;
    }
    #bModal .modal-content{
      min-height:100dvh !important;height:100dvh;border-radius:0 !important;
    }
    #bModal .mb{
      flex:1 1 auto;max-height:none !important;height:auto !important;overflow:auto;
      padding:1rem 1rem calc(1rem + env(safe-area-inset-bottom));
    }
    #bModal .mh{
      border-radius:0;padding-top:max(.8rem, env(safe-area-inset-top));
    }
    #bModal .modal-footer-sticky{
      padding-bottom:max(.75rem, env(safe-area-inset-bottom));
    }
    @media (max-width: 991.98px){
      .tab-bar{padding:.5rem}
      .tab-tools{width:100%;margin-inline-start:0}
      .mini-search-wrap{flex:1 1 100%;min-width:0}
      .mini-search{width:100%;max-width:none}
      .mini-filter-wrap{flex:1 1 auto}
      .icon-circle{width:34px;height:34px}
    }

  </style>
</head>
<body>

<div id="bgBar"></div>

<!-- ── Tab Bar ── -->
<div class="tab-bar">
  <div class="tab-tabs">
    <button class="tb on" data-tab="calendar" onclick="goTab('calendar')">
      <i class="fas fa-calendar-alt"></i> الحجوزات

              style="font-size:.7rem;padding:.26rem .68rem;margin-top:.28rem">
              <i class="fas fa-plus"></i> إضافة مصروف

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="config-fixed.js"></script>

<script>
/* ══════════════════════════════════════════
   الحالة العامة للصفحة
══════════════════════════════════════════ */
let cal, bModal;
let _calOk      = false;
let _pageShown  = false;
let _allEvents  = [];      // كل الحجوزات
let _filteredEvents = [];  // بعد الفلتر
let _tasksCache = null;
let _selectedType = "";
let _searchTerm = "";
let _searchTerm = "";
let _searchQuery = "";

/* ── أدوات مساعدة ── */
const x   = t => Utils.esc(t);
const n   = v => Utils.formatNum(v, 0);
const np  = v => Utils.normalizePhone(v);
const $s  = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };

/* ══════════════════════════════════════════
   تهيئة الصفحة عند DOMContentLoaded
══════════════════════════════════════════ */
document.addEventListener("DOMContentLoaded", async () => {

  // 1) تحقق الجلسة
  if (!Utils.guardSession()) return;

  // 2) Bootstrap Modal
  bModal = new bootstrap.Modal(document.getElementById("bModal"));
  document.getElementById("bModal").addEventListener("shown.bs.modal", () => {
    try { window.parent.postMessage({ type: "bookings:modal", open: true }, "*"); } catch(e) {}
  });
  document.getElementById("bModal").addEventListener("hidden.bs.modal", () => {
    try { window.parent.postMessage({ type: "bookings:modal", open: false }, "*"); } catch(e) {}
    resetForm();
    setTimeout(() => { if (cal) cal.updateSize(); }, 80);
  });
  document.getElementById("bForm").addEventListener("submit", saveBooking);
  document.getElementById("typeFilter").addEventListener("change", e => {
    _selectedType = e.target.value || "";
    applyFilters();
  });
  document.getElementById("bookingSearch").addEventListener("keydown", e => {
    if (e.key === 'Enter') { e.preventDefault(); runSearch(); }
  });

  // 3) استمع على AppLoader — البيانات الأساسية
  AppLoader.on("onInitReady", (ds) => {
    _applyInitData(ds);
  });

  // 4) استمع على تحميل الحجوزات في الخلفية
  AppLoader.on("onBookingsReady", (bookings) => {
    _allEvents = Array.isArray(bookings) ? bookings : [];
    applyFilters();
    _updateKPIs();
    hideBgBar();
    if (cal) cal.refetchEvents();
    renderTasksFromCache();
  });

  // 5) بدء التشغيل
  showBgBar();
  await AppLoader.start();

  // 6) إذا الحجوزات جاهزة مسبقاً (من جلسة سابقة لنفس الصفحة)
  if (AppLoader.isBookingsReady()) hideBgBar();

  // 7) تهيئة التقويم
  const tools = document.getElementById("calendarTools");
  if (tools) tools.style.display = "flex";
  _pageShown = true;
  if (!_calOk) { initCal(); _calOk = true; }
});

/* ══════════════════════════════════════════
   تطبيق بيانات getInitData
══════════════════════════════════════════ */
function _applyInitData(ds) {
  const cfg   = ds.systemConfig || {};
  const users = ds.users || [];

  // قوائم منسدلة
  const types = cfg.bookingTypes         || ["زواج","تغطية","إعلان"];
  const srv   = cfg.bookingExtraServices || ["صور","فيديو","درون"];
  const activeUsers = users.filter(u => u.status === "فعال");

  // select المسند
  const selU = document.getElementById("f-assigned");
  selU.innerHTML = `<option value="">-- بدون إسناد --</option>`;
  activeUsers.forEach(u =>
    selU.insertAdjacentHTML("beforeend",
      `<option value="${x(u.code)}">${x(u.name)}</option>`));

  // فلتر النوع
  const typeSelEl = document.getElementById("typeFilter");
  const prevType  = typeSelEl.value || _selectedType || "";
  typeSelEl.innerHTML = `<option value="">كل الأنواع</option>` +
    types.map(t => `<option value="${x(t)}">${x(t)}</option>`).join("");
  if (prevType && types.includes(prevType)) {
    typeSelEl.value = prevType;
    _selectedType   = prevType;
  }

  // أزرار النوع والخدمات
  buildTypes(types);
  buildSrv(srv, []);

  // الأعمال المسندة من dashStats
  if (ds.dashStats) {
    _buildTasksFromDashStats(ds.dashStats);
    renderTasksFromCache();
  }
}

/* ══════════════════════════════════════════
   بناء tasks من بيانات لوحة التحكم
══════════════════════════════════════════ */
function _buildTasksFromDashStats(stats) {
  // dashStats يحوي todaysBookings فقط — نعرضها كـ upcoming
  const upcoming = (stats.todaysBookings || []).map(b => ({
    id: b.id || "",
    title: `${b.name || ""} — ${b.type || ""}`,
    date: b.date || "",
    place: b.place || "",
    assignedToName: b.assignedTo || "",
    assignedToMobile: "",
    details: "",
    remaining: b.remaining || 0
  }));
  _tasksCache = { upcoming, past: [] };
}

/* ══════════════════════════════════════════
   tabs
══════════════════════════════════════════ */
function goTab(id) {
  document.querySelectorAll(".tb[data-tab]").forEach(b => b.classList.toggle("on", b.dataset.tab === id));
  document.querySelectorAll(".pane").forEach(p => p.classList.toggle("on", p.id === "pane-" + id));
  if (id === "calendar") {
    _pageShown = true;
    if (!_calOk) { initCal(); _calOk = true; }
    else { setTimeout(() => cal.updateSize(), 60); setTimeout(() => cal.updateSize(), 220); }
  }
  const tools = document.getElementById("calendarTools");
  if (tools) tools.style.display = id === "calendar" ? "flex" : "none";
  if (id === "tasks") renderTasksFromCache();
}

/* ── رسائل من الإطار الرئيسي ── */
window.addEventListener("message", e => {
  if (e.data?.type === "page:shown" && e.data?.payload?.pageId === "bookings") {
    if (!_calOk) { initCal(); _calOk = true; }
    else { setTimeout(() => cal.updateSize(), 60); setTimeout(() => cal.updateSize(), 220); }
  }
});

/* ══════════════════════════════════════════
   تحديث يدوي كامل
══════════════════════════════════════════ */
async function hardRefresh() {
  Swal.fire({ title: "جاري التحديث...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    // إعادة تحميل الحجوزات
    await AppLoader.refreshBookings();
    // إعادة تحميل getInitData لتحديث الإعدادات
    const fresh = await API.run("getInitData").catch(() => null);
    if (fresh && fresh.success) _applyInitData(fresh);
    if (cal) { cal.refetchEvents(); setTimeout(() => cal.updateSize(), 60); }
    const date = document.getElementById("f-date").value;
    if (date && document.getElementById("bModal").classList.contains("show")) renderDayList(date);
    Swal.fire({ title: "تم التحديث ✅", icon: "success", timer: 1000, showConfirmButton: false });
  } catch(e) {
    Swal.fire("خطأ", "تعذر التحديث", "error");
  }
}

/* ══════════════════════════════════════════
   KPIs
══════════════════════════════════════════ */
function _updateKPIs() {}

/* ══════════════════════════════════════════
   البحث والفلترة
══════════════════════════════════════════ */
function matchesSearch(ev) {
  if (!_searchQuery) return true;
  const p = ev.extendedProps || {};
  const q = _searchQuery.toLowerCase();
  const id = String(p.id || ev.id || '');
  const invoiceNo = id.slice(-8);
  const hay = [p.name, p.phone, p.type, p.place, id, invoiceNo].map(v => String(v || '').toLowerCase()).join(' | ');
  return hay.includes(q);
}

function applyFilters() {
  _filteredEvents = (_allEvents || []).filter(ev => {
    const typeOk = !_selectedType || String(ev.extendedProps?.type || '').trim() === _selectedType;
    return typeOk && matchesSearch(ev);
  });
  if (cal) cal.refetchEvents();
  const date = document.getElementById("f-date").value;
  if (date) renderDayList(date);
}

function runSearch() {
  _searchQuery = (document.getElementById('bookingSearch').value || '').trim();
  applyFilters();
}

function clearFilters() {
  document.getElementById("bookingSearch").value = "";
  document.getElementById("typeFilter").value = "";
  _searchQuery = "";
  _selectedType = "";
  applyFilters();
}

/* ══════════════════════════════════════════
   التقويم FullCalendar
══════════════════════════════════════════ */
function initCal() {
  cal = new FullCalendar.Calendar(document.getElementById("calendar"), {
    initialView: "dayGridMonth",
    locale: "ar",
    direction: "rtl",
    firstDay: 0,
    height: "auto",
    headerToolbar: { left: "dayGridMonth today", center: "title", right: "prev,next" },
    buttonText: { today: "اليوم", month: "شهر" },
    displayEventTime: false,
    events: (info, ok) => ok([...(_filteredEvents || [])]),
    dateClick: info => openModal(info.dateStr.substring(0, 10)),
    eventClick: info => openModal(info.event.startStr.substring(0, 10)),
  });
  cal.render();

  const adapt = () => cal.setOption("headerToolbar",
    window.innerWidth < 520
      ? { left: "title", center: "", right: "prev,next" }
      : { left: "dayGridMonth today", center: "title", right: "prev,next" }
  );
  adapt();
  window.addEventListener("resize", adapt);
}

/* ══════════════════════════════════════════
   Modal اليوم
══════════════════════════════════════════ */
function openModal(date) {
  resetForm();
  document.getElementById("f-date").value = date;
  document.getElementById("m-ttl").textContent = "📅 إدارة حجوزات يوم " + date;
  bModal.show();
  setTimeout(() => document.getElementById('f-name')?.focus(), 250);
  renderDayList(date);
}

function getDayEvents(date) {
  const src = (_searchTerm || _selectedType) ? _filteredEvents : _allEvents;
  return src.filter(e => (e.start || "").substring(0, 10) === date);
}

function renderDayList(date) {
  const el  = document.getElementById("day-list");
  const day = getDayEvents(date);
  if (!day.length) {
    el.innerHTML = `<div class="empty">
      <i class="fas fa-calendar-xmark"></i>
      <p>لا توجد حجوزات لهذا اليوم${_selectedType ? " ضمن النوع المحدد" : ""}${_searchTerm ? " وفق البحث الحالي" : ""}</p>
    </div>`;
    return;
  }

  el.innerHTML = day.map(ev => {
    const p   = ev.extendedProps || {};
    const rem = parseFloat(p.remaining || 0);
    const exps = (p.expenses || []).map(e => `${x(e.reason||"")} (${x(e.type)}:${e.value})`).join(" | ");
    return `
    <div class="dc">
      <div class="dc-top">
        <div class="dc-name">${x(p.name || "")} — ${x(p.type || "")}</div>
        <span class="chip ${rem > 0 ? "cr" : "cg"}">${rem > 0 ? n(rem) + " ريال" : "مسدد ✓"}</span>
      </div>
      <div class="dc-chips">
        ${p.place  ? `<span class="chip cb"><i class="fas fa-location-dot"></i> ${x(p.place)}</span>` : ""}
        ${p.phone  ? `<span class="chip cb"><i class="fas fa-phone"></i> ${x(p.phone)}</span>` : ""}
        ${p.time   ? `<span class="chip cm"><i class="fas fa-clock"></i> ${x(p.time)}</span>` : ""}
        ${p.assignedToName ? `<span class="chip co"><i class="fas fa-user-check"></i> ${x(p.assignedToName)}</span>` : ""}
      </div>
      <div class="dc-fin">
        <span>المبلغ: <strong>${n(p.amount||0)}</strong></span>
        <span>الواصل: <strong style="color:var(--ok)">${n(p.deposit||0)}</strong></span>
        <span style="color:var(--err);font-weight:800">المتبقي: ${n(p.remaining||0)}</span>
        ${exps ? `<span style="color:var(--muted);font-size:.68rem;width:100%">المصروفات: ${exps}</span>` : ""}
      </div>
      <div class="dc-acts">
        ${rem > 0
          ? `<button class="btn btn-success btn-sm" onclick="actPaid('${p.id}','${date}')">
               <i class="fas fa-check"></i> مسدد
             </button>`
          : ""}
        ${rem > 0 && p.phone
          ? `<button class="btn btn-warning btn-sm" onclick="actRemind('${x(p.phone)}','${x(p.name)}',${rem})">
               <i class="fas fa-bell"></i>
             </button>`
          : ""}
        <button class="btn btn-info btn-sm text-white" onclick="actInv('${p.id}','${x(p.phone||"")}')">
          <i class="fas fa-receipt"></i>
        </button>
        <button class="btn btn-outline-warning btn-sm" onclick="actEdit(${JSON.stringify(p).replace(/"/g,"&quot;")})">
          <i class="fas fa-edit"></i>
        </button>
        <button class="btn btn-outline-danger btn-sm" onclick="actDel('${p.id}','${date}')">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>`;
  }).join("");
}

/* ══════════════════════════════════════════
   بناء أزرار النوع والخدمات
══════════════════════════════════════════ */
let _types = [], _srv = [];

function buildTypes(typesArr, sel = "") {
  if (typesArr) _types = typesArr;
  if (!sel && _types.length) sel = _types[0];
  document.getElementById("f-type").value = sel;
  document.getElementById("type-btns").innerHTML = _types.map(t =>
    `<button type="button" class="tg ${t === sel ? "st" : ""}" onclick="pickType('${x(t)}')">${x(t)}</button>`
  ).join("");
}

function buildSrv(srvArr, sel = []) {
  if (srvArr) _srv = srvArr;
  document.getElementById("srv-btns").innerHTML = _srv.map(s =>
    `<button type="button" class="tg ${sel.includes(s) ? "ss" : ""}" onclick="this.classList.toggle('ss')">${x(s)}</button>`
  ).join("");
}

function pickType(t) {
  document.getElementById("f-type").value = t;
  document.querySelectorAll("#type-btns .tg").forEach(b =>
    b.classList.toggle("st", b.textContent.trim() === t));
}

function getSelSrv() {
  return Array.from(document.querySelectorAll("#srv-btns .tg.ss")).map(b => b.textContent.trim());
}

/* ══════════════════════════════════════════
   المصروفات والحسابات
══════════════════════════════════════════ */
function addExpRow(exp = {}) {
  const c = document.getElementById("exp-rows");
  const d = document.createElement("div");
  d.className = "er";
  d.innerHTML = `
    <input class="form-control er-r" placeholder="السبب" value="${x(exp.reason || "")}">
    <select class="form-select er-t" onchange="calcFin()">
      <option value="">النوع</option>
      <option value="مقطوع" ${exp.type === "مقطوع" ? "selected" : ""}>مقطوع</option>
      <option value="نسبة"  ${exp.type === "نسبة"  ? "selected" : ""}>نسبة %</option>
    </select>
    <input type="number" class="form-control er-v" min="0" placeholder="0"
      value="${exp.value || ""}" oninput="calcFin()">
    <button type="button" class="ed" onclick="this.closest('.er').remove();calcFin()">
      <i class="fas fa-times"></i>
    </button>`;
  c.appendChild(d);
}

function getExps() {
  return Array.from(document.querySelectorAll(".er")).map(r => ({
    reason: r.querySelector(".er-r").value.trim(),
    type:   r.querySelector(".er-t").value,
    value:  parseFloat(r.querySelector(".er-v").value) || 0
  })).filter(e => e.reason && e.type);
}

function calcFin() {
  const a = parseFloat(document.getElementById("f-amount").value)  || 0;
  const d = parseFloat(document.getElementById("f-deposit").value) || 0;
  document.getElementById("f-rem").value = Math.max(0, a - d);
  let exp = 0;
  document.querySelectorAll(".er").forEach(r => {
    const t = r.querySelector(".er-t").value;
    const v = parseFloat(r.querySelector(".er-v").value) || 0;
    if (t === "مقطوع") exp += v;
    else if (t === "نسبة") exp += a * (v / 100);
  });
  document.getElementById("f-net").value = Math.max(0, a - exp).toFixed(2);
}

/* ══════════════════════════════════════════
   حفظ الحجز
══════════════════════════════════════════ */
async function saveBooking(ev) {
  ev.preventDefault();
  const srvs = getSelSrv();
  const base = document.getElementById("f-details").value.trim();
  const full = base
    ? `${base} | خدمات: ${srvs.join(", ") || "لا يوجد"}`
    : `خدمات: ${srvs.join(", ") || "لا يوجد"}`;

  const payload = {
    id:         document.getElementById("f-id").value.trim(),
    type:       document.getElementById("f-type").value,
    name:       document.getElementById("f-name").value.trim(),
    phone:      document.getElementById("f-phone").value.trim(),
    date:       document.getElementById("f-date").value,
    place:      document.getElementById("f-place").value.trim(),
    time:       document.getElementById("f-time").value,
    assignedTo: document.getElementById("f-assigned").value,
    details:    full,
    amount:     document.getElementById("f-amount").value  || 0,
    deposit:    document.getElementById("f-deposit").value || 0,
    expenses:   JSON.stringify(getExps()),
  };

  if (!payload.type || !payload.name || !payload.date) {
    Swal.fire("تنبيه", "يرجى ملء الحقول المطلوبة (النوع، الاسم، التاريخ)", "warning");
    return;
  }

  document.getElementById("save-txt").textContent = "جاري الحفظ...";
  Swal.fire({ title: "جاري الحفظ...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });

  try {
    await API.run(payload.id ? "updateEvent" : "addEvent", payload);

    // تحديث الحجوزات في الخلفية
    AppLoader.refreshBookings().catch(console.warn);

    Swal.fire({ title: "تم بنجاح ✅", icon: "success", timer: 1400, showConfirmButton: false });
    const date = payload.date;
    resetForm();
    document.getElementById("f-date").value = date;

    // تحديث التقويم والقائمة
    if (cal) cal.refetchEvents();
    renderDayList(date);

  } catch(e) {
    Swal.fire("خطأ", "تعذر حفظ الحجز — " + (e.message || ""), "error");
    console.error(e);
  } finally {
    document.getElementById("save-txt").textContent = "حفظ الحجز";
  }
}

/* ══════════════════════════════════════════
   إعادة ضبط النموذج
══════════════════════════════════════════ */
function resetForm() {
  document.getElementById("bForm").reset();
  document.getElementById("f-id").value = "";
  document.getElementById("exp-rows").innerHTML = "";
  document.getElementById("day-list").innerHTML = "";
  document.getElementById("save-txt").textContent = "حفظ الحجز";
  buildTypes(null);
  buildSrv(null, []);
  calcFin();
}

/* ══════════════════════════════════════════
   أحداث البطاقات
══════════════════════════════════════════ */
function actEdit(p) {
  document.getElementById("f-id").value      = p.id       || "";
  document.getElementById("f-name").value    = p.name     || "";
  document.getElementById("f-phone").value   = p.phone    || "";
  document.getElementById("f-date").value    = p.date     || "";
  document.getElementById("f-place").value   = p.place    || "";
  document.getElementById("f-time").value    = p.time     || "";
  document.getElementById("f-amount").value  = p.amount   || "";
  document.getElementById("f-deposit").value = p.deposit  || "";
  document.getElementById("f-assigned").value = p.assignedToCode || "";
  document.getElementById("save-txt").textContent = "تحديث الحجز";

  // تفاصيل + خدمات
  const det  = String(p.details || "");
  const sm   = det.match(/خدمات:\s*([^|]+)/);
  const selSrv = sm ? sm[1].split(",").map(s => s.trim()).filter(s => s && s !== "لا يوجد") : [];
  document.getElementById("f-details").value = det
    .replace(/\s*\|\s*خدمات:.*$/, "")
    .replace(/^خدمات:.*$/, "")
    .trim();

  buildTypes(null, p.type || "");
  buildSrv(null, selSrv);

  document.getElementById("exp-rows").innerHTML = "";
  (p.expenses || []).forEach(e => addExpRow(e));
  calcFin();
  document.getElementById("bForm").scrollIntoView({ behavior: "smooth", block: "start" });
}

async function actPaid(id, date) {
  const r = await Swal.fire({
    title: "تسجيل السداد؟", icon: "question",
    showCancelButton: true, confirmButtonText: "نعم", cancelButtonText: "إلغاء",
    confirmButtonColor: "var(--ok)"
  });
  if (!r.isConfirmed) return;

  Swal.fire({ title: "جاري التحديث...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    await API.run("markPaid", id);

    // تحديث محلي سريع في الذاكرة
    _allEvents = _allEvents.map(ev => {
      if (String(ev.extendedProps?.id || "") === String(id)) {
        const amount = parseFloat(ev.extendedProps?.amount || 0);
        return { ...ev, extendedProps: { ...(ev.extendedProps || {}), deposit: amount, remaining: 0 }, color: "#6fa8dc" };
      }
      return ev;
    });
    DataStore.bookings = _allEvents;
    DataStore._rebuildBookingsIndex();

    applyFilters()
    _updateKPIs();
    if (cal) cal.refetchEvents();
    renderDayList(date);
    Swal.fire({ title: "تم السداد ✅", icon: "success", timer: 1400, showConfirmButton: false });
  } catch(e) {
    Swal.fire("خطأ", "تعذر التحديث", "error");
  }
}

function actRemind(phone, name, rem) {
  const templates = DataStore.templates || [];
  const tmpl = templates.find(t => t.type === "reminder");
  const cfg   = DataStore.systemConfig || {};
  let txt;
  if (tmpl && tmpl.text) {
    txt = tmpl.text
      .replace(/\{اسم_العميل\}/g, name)
      .replace(/\{المتبقي\}/g,    String(rem))
      .replace(/\{اسم_الوكالة\}/g, cfg.agencyName || "وكالة ميديا");
  } else {
    txt = `مرحباً ${name}\n\nتذكير بسداد المبلغ المتبقي: ${rem} ريال\n\n${cfg.agencyName || "وكالة ميديا"}`;
  }
  window.open(`https://wa.me/${np(phone)}?text=${encodeURIComponent(txt)}`, "_blank");
}

async function actInv(id, phone) {
  Swal.fire({ title: "جاري إنشاء الفاتورة...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    const url = await API.run("generateInvoicePDF", id);
    Swal.close();
    const templates = DataStore.templates || [];
    const tmpl = templates.find(t => t.type === "invoice");
    const cfg  = DataStore.systemConfig || {};
    let txt;
    if (tmpl && tmpl.text) {
      txt = tmpl.text
        .replace(/\{رابط_الفاتورة\}/g, url)
        .replace(/\{اسم_الوكالة\}/g,  cfg.agencyName || "وكالة ميديا");
    } else {
      txt = `فاتورة حجزك:\n${url}\n\n${cfg.agencyName || "وكالة ميديا"}`;
    }
    window.open(`https://wa.me/${np(phone)}?text=${encodeURIComponent(txt)}`, "_blank");
  } catch(e) {
    Swal.fire("خطأ", "تعذر إنشاء الفاتورة", "error");
  }
}

async function actDel(id, date) {
  const r = await Swal.fire({
    title: "حذف الحجز؟", icon: "warning",
    showCancelButton: true, confirmButtonText: "نعم احذف", cancelButtonText: "إلغاء",
    confirmButtonColor: "var(--err)"
  });
  if (!r.isConfirmed) return;

  Swal.fire({ title: "جاري الحذف...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    await API.run("deleteEvent", id);

    // حذف محلي فوري
    _allEvents = _allEvents.filter(ev => String(ev.id || "") !== String(id));
    DataStore.bookings = _allEvents;
    DataStore._rebuildBookingsIndex();

    applyFilters()
    _updateKPIs();
    if (cal) cal.refetchEvents();
    renderDayList(date);
    Swal.fire({ title: "تم الحذف ✅", icon: "success", timer: 1200, showConfirmButton: false });
  } catch(e) {
    Swal.fire("خطأ", "تعذر الحذف", "error");
  }
}

/* ══════════════════════════════════════════
   الأعمال المسندة
══════════════════════════════════════════ */
function renderTasksFromCache() {
  const { permissions } = Session.get();
  const all = permissions?.allPages === true;
  $s("tk-ttl", all ? "الأعمال المسندة (الجميع)" : "الأعمال المسندة لي");

  // إذا البيانات غير محمّلة بعد — انتظر getAssignedBookings
  if (!_tasksCache) {
    const code = Session.get().userCode || "";
    API.run("getAssignedBookings", code, all).then(data => {
      _tasksCache = _buildTasksStructure(data, code);
      _renderTasksDOM();
    }).catch(() => {
      document.getElementById("lst-up").innerHTML = `<div class="empty"><i class="fas fa-wifi"></i><p>تعذر التحميل</p></div>`;
    });
    return;
  }
  _renderTasksDOM();
}

function _buildTasksStructure(data, userCode) {
  // data إما مصفوفة حجوزات أو {upcoming,past}
  if (Array.isArray(data)) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const upcoming = [], past = [];
    data.forEach(b => {
      const d = b.date ? new Date(b.date) : null;
      if (!d) return;
      (d >= today ? upcoming : past).push({
        id: b.id || "",
        title: `${b.name || b.customerName || ""} — ${b.type || ""}`,
        date: b.date || "",
        place: b.place || "",
        assignedToName: b.assignedToName || "",
        assignedToMobile: b.assignedToMobile || "",
        details: b.details || "",
        remaining: b.remaining || 0
      });
    });
    return { upcoming, past };
  }
  return data || { upcoming: [], past: [] };
}

function _renderTasksDOM() {
  const up = _tasksCache?.upcoming || [];
  const pa = _tasksCache?.past     || [];
  $s("cnt-up", up.length);
  $s("cnt-pa", pa.length);

  const upEl = document.getElementById("lst-up");
  const paEl = document.getElementById("lst-pa");

  upEl.innerHTML = up.length ? up.map(b => tkCard(b, false)).join("") :
    `<div class="empty"><i class="fas fa-calendar-check"></i><p>لا أعمال قادمة</p></div>`;
  paEl.innerHTML = pa.length ? pa.map(b => tkCard(b, true)).join("") :
    `<div class="empty"><i class="fas fa-clock-rotate-left"></i><p>لا أعمال سابقة</p></div>`;
}

function tkCard(b, isPast) {
  const mob   = np(b.assignedToMobile || "");
  const waUrl = mob
    ? `https://wa.me/${mob}?text=${encodeURIComponent(`مرحباً ${b.assignedToName||""}\nتذكير: ${b.title||""}\nالتاريخ: ${b.date}\nالمكان: ${b.place||""}`)}`
    : "";
  const det   = String(b.details || "");
  const sm    = det.match(/خدمات:\s*([^|]+)/);
  const srvs  = sm ? sm[1].trim() : "";
  const baseD = det.replace(/\s*\|\s*خدمات:.*$/, "").replace(/^خدمات:.*$/, "").trim();
  const srvChips = srvs && srvs !== "لا يوجد"
    ? `<div class="ts">${srvs.split(",").map(s => `<span class="chip co">${x(s.trim())}</span>`).join("")}</div>` : "";

  return `
  <div class="tc${isPast ? " past" : ""}">
    <div class="td"><i class="fas fa-calendar-day"></i> ${x(b.date || "")}</div>
    <div class="tt">${x(b.title || "")}</div>
    <div class="tm">
      ${b.place ? `<i class="fas fa-location-dot" style="color:var(--p)"></i> ${x(b.place)} ` : ""}
      ${b.assignedToName ? `<i class="fas fa-user-check" style="color:var(--ok)"></i> ${x(b.assignedToName)}` : ""}
    </div>
    ${srvChips}
    ${baseD ? `<div style="margin-top:.32rem;font-size:.71rem;color:var(--muted);border-right:2px solid var(--p);padding-right:.42rem">${x(baseD)}</div>` : ""}
    ${waUrl ? `<a href="${waUrl}" target="_blank" class="twa"><i class="fab fa-whatsapp"></i> تذكير واتساب</a>` : ""}
  </div>`;
}
