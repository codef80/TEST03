
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>C1 — التحقق من التوفر</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">
  <link rel="icon" type="image/png" href="apple-touch-icon.png">
  <link rel="shortcut icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="وكالة ميديا">
  <meta name="theme-color" content="#014979">
  <script src="config-fixed.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root{--p:#014979;--pdk:#013560;--gold:#c6a43f;--ok:#059669;--err:#dc2626;--bg:#f1f5f9;--card:#fff;--txt:#0f172a;--muted:#64748b;--border:rgba(15,23,42,.08);--sh:0 8px 24px rgba(15,23,42,.08);--r:1.2rem}
    *{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:'Tajawal',sans-serif}
    body{padding:1rem}.wrap{max-width:1100px;margin:0 auto}.head{background:linear-gradient(135deg,#00243f,#014979 60%,#026aa7);color:#fff;border-radius:1.4rem;padding:1.1rem 1.2rem;box-shadow:var(--sh);margin-bottom:1rem}.title{font-size:1.3rem;font-weight:900;margin:0 0 .25rem}.sub{margin:0;color:rgba(255,255,255,.9);font-size:.95rem}
    .box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}.box-h{padding:.95rem 1rem;border-bottom:1px solid var(--border);font-weight:900;color:var(--p);display:flex;align-items:center;gap:.45rem}.box-b{padding:1rem}
    .toolbar{display:grid;grid-template-columns:1fr 1fr auto;gap:.65rem;margin-bottom:1rem}.form-control,.form-select{border-radius:.9rem;padding:.7rem .9rem;border-color:#dbe4ee}.form-control:focus,.form-select:focus{border-color:rgba(1,73,121,.35);box-shadow:0 0 0 .2rem rgba(1,73,121,.12)}
    .btn{border-radius:.9rem;font-weight:800;padding:.72rem 1rem}.btn-main{background:var(--p);border-color:var(--p);color:#fff}.btn-main:hover{background:var(--pdk);border-color:var(--pdk);color:#fff}.btn-soft{background:#fff;border:1px solid var(--border);color:#334155}.btn-soft:hover{background:#f8fafc}
    .status{margin-top:1rem;border:1px solid var(--border);border-radius:1rem;padding:1rem;background:#fff}.status-head{font-weight:900;margin-bottom:.55rem}.status-line{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap}.badge-x{display:inline-flex;align-items:center;gap:.35rem;border-radius:999px;padding:.32rem .7rem;font-size:.8rem;font-weight:800}.ok{background:#d1fae5;color:#065f46}.err{background:#fee2e2;color:#991b1b}.muted{background:#f1f5f9;color:#475569}
    .actions{display:flex;gap:.55rem;flex-wrap:wrap;margin-top:.9rem}.hint{color:var(--muted);font-size:.85rem;margin-top:.3rem}
    #calendar{padding:.6rem}.fc{font-family:'Tajawal',sans-serif;font-size:.84rem}.fc .fc-toolbar-title{font-size:1.05rem;font-weight:900;color:var(--p)}.fc .fc-button-primary{background:var(--p)!important;border-color:var(--p)!important;border-radius:.7rem!important;font-weight:800}.fc .fc-button-primary:not(:disabled):hover{background:var(--pdk)!important;border-color:var(--pdk)!important}.fc .fc-col-header-cell-cushion{color:var(--p);font-weight:900;text-decoration:none}.fc .fc-daygrid-day-number{text-decoration:none;color:var(--txt);font-weight:700}.fc .fc-daygrid-event{border:none;border-radius:.45rem;padding:2px 6px;font-weight:700}.fc .fc-daygrid-day.fc-day-today{background:rgba(1,73,121,.06)!important}
    .loader{display:flex;justify-content:center;align-items:center;padding:2rem}.spinner{width:38px;height:38px;border:4px solid #dbeafe;border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:768px){body{padding:.7rem}.toolbar{grid-template-columns:1fr}.actions .btn{flex:1}#calendar{padding:.2rem}.fc .fc-toolbar{gap:.45rem;flex-wrap:wrap}.fc .fc-toolbar-title{font-size:.95rem}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="head">
    <h1 class="title">التحقق من التوفر</h1>
    <p class="sub">اختر اليوم المناسب لك، ثم انتقل مباشرة إلى صفحة إكمال الحجز.</p>
  </section>

  <section class="box mb-3">
    <div class="box-h"><i class="fa-solid fa-calendar-check"></i> التحقق من التوفر</div>
    <div class="box-b">
      <div class="toolbar">
        <select id="typeSelect" class="form-select"></select>
        <input id="selectedDateInput" type="text" class="form-control" placeholder="اليوم المختار" readonly>
        <button class="btn btn-soft" type="button" id="todayBtn"><i class="fa-solid fa-calendar-day me-1"></i> اليوم</button>
      </div>
      <div id="calendarWrap"><div class="loader"><div class="spinner"></div></div></div>
      <div class="status" id="statusBox">
        <div class="status-head">حالة اليوم المختار</div>
        <div class="status-line">
          <span class="badge-x muted" id="statusBadge"><i class="fa-regular fa-calendar"></i> لم يتم اختيار يوم بعد</span>
          <span id="statusText" class="hint">اختر يومًا من التقويم لعرض حالة التوفر.</span>
        </div>
        <div class="actions">
          <a id="completeBtn" class="btn btn-main disabled" href="#" aria-disabled="true"><i class="fa-brands fa-whatsapp me-1"></i> إكمال الحجز</a>
          <a id="contactBtn" class="btn btn-soft" href="#" target="_blank" rel="noopener"><i class="fa-solid fa-phone me-1"></i> تواصل سريع</a>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
(function () {
  const logo = (window.APP_CONFIG && APP_CONFIG.APP_LOGO) || "https://i.ibb.co/N6TXzy3q/image.png";
  const appName = (window.APP_CONFIG && APP_CONFIG.APP_NAME) || "وكالة ميديا";
  function setLink(rel, href, sizes) {
    let link = document.querySelector(`link[rel="${rel}"]`);
    if (!link) { link = document.createElement("link"); link.rel = rel; document.head.appendChild(link); }
    link.href = href; if (sizes) link.sizes = sizes;
  }
  setLink("icon", logo); setLink("shortcut icon", logo); setLink("apple-touch-icon", logo, "180x180");
  let metaTheme = document.querySelector('meta[name="theme-color"]'); if (!metaTheme) { metaTheme = document.createElement("meta"); metaTheme.name = "theme-color"; document.head.appendChild(metaTheme); } metaTheme.content = "#014979";
  let metaApple = document.querySelector('meta[name="apple-mobile-web-app-title"]'); if (!metaApple) { metaApple = document.createElement("meta"); metaApple.name = "apple-mobile-web-app-title"; document.head.appendChild(metaApple); } metaApple.content = appName;
})();

const state = { cfg:null, events:[], selectedDate:'', calendar:null };

function normalizePhone(raw){ let s=String(raw||'').replace(/\s/g,'').replace(/^\+/,'').replace(/^'/,''); if(s.startsWith('966')&&s.length===12)return s; if(s.startsWith('05')&&s.length===10)return '966'+s.slice(1); if(s.startsWith('5')&&s.length===9)return '966'+s; return s; }
function fmtDateAr(dateStr){ if(!dateStr) return ''; const d=new Date(dateStr+'T00:00:00'); return d.toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'}); }
function safeTypes(cfg){ const arr = Array.isArray(cfg?.publicBookingTypes) && !cfg.publicBookingTypes.includes('__ALL__') ? cfg.publicBookingTypes : (cfg?.bookingTypes || []); return arr.length ? arr : ['حجز']; }
function getCompleteUrl(){ return state.cfg?.publicCompleteUrl || 'c3.html'; }
function getContactUrl(){ const phone = state.cfg?.publicContactNumber || state.cfg?.whatsappNumber || ''; return phone ? `https://wa.me/${normalizePhone(phone)}` : '#'; }
function isAvailable(dateStr){ return !state.events.some(e => (e.start || e.date || '').substring(0,10) === dateStr); }
function selectedType(){ return document.getElementById('typeSelect').value || ''; }
function buildCompleteHref(){ if(!state.selectedDate) return '#'; const url = new URL(getCompleteUrl(), window.location.href); url.searchParams.set('date', state.selectedDate); if (selectedType()) url.searchParams.set('type', selectedType()); return url.toString(); }

function renderTypes(){ const sel=document.getElementById('typeSelect'); const types=safeTypes(state.cfg); sel.innerHTML = '<option value="">اختر نوع الحجز</option>' + types.map(t=>`<option value="${String(t).replace(/"/g,'&quot;')}">${t}</option>`).join(''); }

function updateStatus(){
  const badge = document.getElementById('statusBadge');
  const text = document.getElementById('statusText');
  const dateInput = document.getElementById('selectedDateInput');
  const completeBtn = document.getElementById('completeBtn');
  const dateStr = state.selectedDate;
  dateInput.value = dateStr ? `${fmtDateAr(dateStr)} — ${dateStr}` : '';
  document.getElementById('contactBtn').href = getContactUrl();
  if(!dateStr){ badge.className='badge-x muted'; badge.innerHTML='<i class="fa-regular fa-calendar"></i> لم يتم اختيار يوم بعد'; text.textContent='اختر يومًا من التقويم لعرض حالة التوفر.'; completeBtn.classList.add('disabled'); completeBtn.setAttribute('aria-disabled','true'); completeBtn.href='#'; return; }
  if(isAvailable(dateStr)){
    badge.className='badge-x ok'; badge.innerHTML='<i class="fa-solid fa-check"></i> متاح';
    text.textContent=`اليوم ${fmtDateAr(dateStr)} متاح حاليًا. يمكنك المتابعة إلى صفحة إكمال الحجز.`;
    completeBtn.classList.remove('disabled'); completeBtn.removeAttribute('aria-disabled'); completeBtn.href = buildCompleteHref();
  } else {
    badge.className='badge-x err'; badge.innerHTML='<i class="fa-solid fa-xmark"></i> غير متاح';
    text.textContent=`اليوم ${fmtDateAr(dateStr)} محجوز حاليًا. اختر يومًا آخر أو تواصل مباشرة.`;
    completeBtn.classList.add('disabled'); completeBtn.setAttribute('aria-disabled','true'); completeBtn.href='#';
  }
}

function initCalendar(){
  const wrap = document.getElementById('calendarWrap');
  wrap.innerHTML = '<div id="calendar"></div>';
  state.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView:'dayGridMonth', locale:'ar', direction:'rtl', height:'auto', events: state.events,
    headerToolbar:{ left:'prev,next today', center:'title', right:'dayGridMonth' },
    buttonText:{ today:'اليوم', month:'شهر' }, displayEventTime:false,
    dateClick(info){ state.selectedDate = info.dateStr; updateStatus(); },
    eventClick(info){ state.selectedDate = info.event.startStr.substring(0,10); updateStatus(); }
  });
  state.calendar.render();
}

async function boot(){
  try {
    const init = await API.runWithRetry('getInitData', 2);
    state.cfg = init?.systemConfig || {};
    renderTypes();
    initCalendar();
    const events = await API.runWithRetry('getPublicEvents', 2);
    state.events = Array.isArray(events) ? events : [];
    if (state.calendar) { state.calendar.removeAllEvents(); state.events.forEach(e => state.calendar.addEvent(e)); }
    updateStatus();
  } catch(err){
    document.getElementById('calendarWrap').innerHTML = '<div class="status"><div class="status-head">تعذر تحميل البيانات</div><div class="hint">تحقق من الإعدادات أو رابط الـ API.</div></div>';
    console.error(err);
  }
}

document.getElementById('todayBtn').addEventListener('click', ()=>{ const d=new Date(); state.selectedDate = d.toISOString().slice(0,10); if(state.calendar) state.calendar.gotoDate(state.selectedDate); updateStatus(); });
document.getElementById('typeSelect').addEventListener('change', updateStatus);
document.getElementById('completeBtn').addEventListener('click', function(e){ if(this.classList.contains('disabled')) e.preventDefault(); });
boot();
</script>
</body>
</html>
